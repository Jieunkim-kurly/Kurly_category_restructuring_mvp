<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>카테고리 필터 MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .phone {
      width: 100%;
      max-width: 390px;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top nav ── */
    .top-nav {
      display: flex; align-items: center; padding: 10px 14px; gap: 10px;
      border-bottom: 1px solid #f0f0f0; background: #fff;
    }
    .nav-back { font-size: 22px; color: #333; cursor: pointer; padding: 4px; }
    .search-bar {
      flex: 1; display: flex; align-items: center; background: #f5f5f5;
      border-radius: 8px; padding: 8px 12px; gap: 8px;
    }
    .search-icon { font-size: 15px; color: #999; }
    .search-text { flex: 1; font-size: 15px; color: #222; }
    .search-clear { font-size: 14px; color: #bbb; cursor: pointer; }
    .cart-icon { font-size: 22px; cursor: pointer; color: #222; }

    /* ── Banner ── */
    .banner {
      background: linear-gradient(135deg, #9B2335 0%, #B8242D 100%);
      padding: 10px 16px; color: #fff; position: relative; overflow: hidden;
    }
    .banner-badge { font-size: 11px; margin-bottom: 3px; opacity: 0.9; }
    .banner-title { font-size: 13px; font-weight: 700; }
    .banner-sub { font-size: 11px; margin-top: 2px; opacity: 0.75; }
    .banner-link {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: rgba(255,255,255,0.8); cursor: pointer;
    }

    /* ── Bottom sheet ── */
    .bottom-sheet {
      flex: 1; background: #fff; border-radius: 16px 16px 0 0;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 -2px 20px rgba(0,0,0,0.08);
      min-height: 0;
    }
    .handle-wrap { display: flex; justify-content: center; padding: 10px 0 6px; }
    .handle { width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px; }
    .sheet-title { padding: 0 16px 10px; font-size: 18px; font-weight: 700; color: #111; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; overflow-x: auto; padding: 0 16px;
      border-bottom: 1.5px solid #eeeeee; gap: 18px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 8px 0; font-size: 13px; color: #aaa;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1.5px; white-space: nowrap;
    }
    .tab.active { color: #6B21A8; border-bottom-color: #6B21A8; font-weight: 700; }

    /* ── Breadcrumb ── */
    .breadcrumb-wrap {
      display: none; padding: 9px 16px; background: #F5F0FF;
      border-bottom: 1px solid #E8DAFF;
    }
    .breadcrumb-wrap.show { display: block; }
    .breadcrumb { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; }
    .bc-item {
      font-size: 12px; color: #6B21A8; cursor: pointer;
      padding: 1px 2px; border-radius: 3px;
    }
    .bc-item:hover { text-decoration: underline; }
    .bc-item.current { font-weight: 700; cursor: default; }
    .bc-item.current:hover { text-decoration: none; }
    .bc-sep { font-size: 11px; color: #9B59B6; }

    /* ── Category list ── */
    .cat-list { flex: 1; overflow-y: auto; padding: 4px 0 0; -webkit-overflow-scrolling: touch; min-height: 0; }

    /* L1 */
    .l1-item { border-bottom: 1px solid #f7f7f7; }
    .l1-header {
      display: flex; align-items: center; padding: 0 16px;
      user-select: none; min-height: 52px; cursor: pointer;
    }
    .l1-header:active { opacity: 0.7; }
    .l1-name { font-size: 15px; font-weight: 500; color: #222; flex: 1; }
    .l1-name.on { color: #6B21A8; font-weight: 700; }
    .l1-name.partial { color: #6B21A8; }
    .l1-count { font-size: 14px; color: #bbb; font-weight: 400; margin-right: 6px; }
    .l1-arrow { color: #bbb; font-size: 11px; transition: transform 0.2s; display: inline-block; }
    .l1-arrow.open { transform: rotate(180deg); }

    /* L1 내 전체 항목 */
    .l1-all-row {
      display: flex; align-items: center; padding: 10px 16px 10px 28px;
      gap: 10px; cursor: pointer; user-select: none;
    }
    .l1-all-row:active { opacity: 0.7; }
    .l1-all-name { font-size: 14px; color: #444; flex: 1; }
    .l1-all-name.on { color: #6B21A8; font-weight: 600; }

    /* L2 */
    .l2-list { display: none; }
    .l2-list.open { display: block; }
    .l2-header {
      display: flex; align-items: center; padding: 0 16px 0 28px;
      user-select: none; min-height: 44px; cursor: pointer;
    }
    .l2-header:active { opacity: 0.7; }
    .l-ind { color: #ccc; font-size: 13px; flex-shrink: 0; margin-right: 2px; font-family: monospace; }
    .folder-icon { font-size: 14px; color: #bbb; flex-shrink: 0; }
    .chk-btn {
      width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ddd;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; background: #fff;
    }
    .chk-btn.on { border-color: #6B21A8; background: #6B21A8; }
    .chk-btn.on::after { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
    /* 부분 선택: 테두리만 보라색, 속은 빈 상태 */
    .chk-btn.partial { border-color: #6B21A8; background: #fff; }
    .chk-btn.partial::after { content: ''; width: 6px; height: 2px; background: #6B21A8; border-radius: 1px; }

    .l2-name { flex: 1; font-size: 14px; color: #444; }
    .l2-name.on { color: #6B21A8; font-weight: 600; }
    .l2-name.partial { color: #6B21A8; }
    .l2-count { font-size: 13px; color: #bbb; }
    .l2-arrow { color: #bbb; font-size: 10px; transition: transform 0.2s; display: inline-block; margin-left: 2px; }
    .l2-arrow.open { transform: rotate(180deg); }

    /* L3 */
    .l3-list { display: none; }
    .l3-list.open { display: block; }
    .l3-item {
      display: flex; align-items: center; padding: 8px 16px 8px 44px;
      cursor: pointer; gap: 8px; user-select: none;
    }
    .l3-item:active { background: #fafafa; }
    .l3-name { flex: 1; font-size: 13px; color: #555; }
    .l3-name.on { color: #6B21A8; font-weight: 600; }
    .l3-count { font-size: 12px; color: #ccc; }

    /* ── Bottom area ── */
    .bottom-area {
      border-top: 1px solid #eee; padding: 10px 16px 24px;
      background: #fff; flex-shrink: 0;
    }
    .filter-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 0; }
    .filter-tags:empty { margin-bottom: 0; }
    .filter-tag {
      display: flex; align-items: center; gap: 5px;
      background: #fff; border: 1.5px solid #6B21A8;
      border-radius: 20px; padding: 5px 10px 5px 12px;
      font-size: 12px; color: #6B21A8; cursor: default;
    }
    .tag-x {
      cursor: pointer; font-size: 13px; line-height: 1; color: #6B21A8;
      font-weight: 600; padding: 1px;
    }
    .bottom-btns { display: flex; align-items: center; gap: 8px; }
    .btn-reset {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: #777; font-size: 13px;
      cursor: pointer; padding: 12px 8px; flex-shrink: 0;
      font-family: inherit;
    }
    .reset-icon {
      width: 16px; height: 16px; border: 1.5px solid #999; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #999;
    }
    .btn-view {
      flex: 1; background: #6B21A8; color: #fff; border: none;
      border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }

    /* ── Divider line within cat list ── */
    .cat-divider { height: 1px; background: #f0f0f0; margin: 4px 0; }
  </style>
</head>

      ]},
    ]

// ── Flat node map ─────────────────────────────────────────────────────────────
const nodes = {};   // id -> {id, name, count, level, parentId, children}

function buildNodes(items, parentId, level) {
  items.forEach(item => {
    nodes[item.id] = { ...item, level, parentId, children: item.children || [] };
    if (item.children && item.children.length) {
      buildNodes(item.children, item.id, level + 1);
    }
  });
}
buildNodes(DATA, null, 1);

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  openL1: null,        // id of expanded L1
  openL2s: new Set(),  // ids of expanded L2s
  filters: new Set(),  // selected filter ids — any level, hierarchical override applied
};

// ── Hierarchy helpers ─────────────────────────────────────────────────────────
function getAncestors(id) {
  const result = [];
  let parentId = nodes[id] ? nodes[id].parentId : null;
  while (parentId) {
    result.push(parentId);
    parentId = nodes[parentId] ? nodes[parentId].parentId : null;
  }
  return result;
}

function getDescendants(id) {
  const result = [];
  const node = nodes[id];
  if (!node || !node.children || !node.children.length) return result;
  node.children.forEach(child => {
    result.push(child.id);
    getDescendants(child.id).forEach(d => result.push(d));
  });
  return result;
}

// 형제 전체 선택 시 자동 상위 승급 (재귀)
function checkAndUpgrade(id) {
  const node = nodes[id];
  if (!node || !node.parentId) return;
  const parent = nodes[node.parentId];
  if (!parent || !parent.children || !parent.children.length) return;
  const allSiblingsSelected = parent.children.every(c => state.filters.has(c.id));
  if (allSiblingsSelected) {
    parent.children.forEach(c => state.filters.delete(c.id));
    getAncestors(parent.id).forEach(aid => state.filters.delete(aid));
    getDescendants(parent.id).forEach(did => state.filters.delete(did));
    state.filters.add(parent.id);
    checkAndUpgrade(parent.id); // 상위도 체크
  }
}

// 노드의 선택 상태: 'on' | 'partial' | 'off'
function getSelectState(id) {
  if (state.filters.has(id)) return 'on';
  const descendants = getDescendants(id);
  if (descendants.some(did => state.filters.has(did))) return 'partial';
  return 'off';
}

// 특정 노드 하위에서 활성화된 필터 수
function countActiveFilters(id) {
  const descendants = getDescendants(id);
  return descendants.filter(did => state.filters.has(did)).length
       + (state.filters.has(id) ? 1 : 0);
}

// Selecting a node removes ancestors (going more specific)
// and removes descendants (going less specific / re-selecting parent).
function toggleFilter(id) {
  if (state.filters.has(id)) {
    state.filters.delete(id);
  } else {
    getAncestors(id).forEach(aid => state.filters.delete(aid));
    getDescendants(id).forEach(did => state.filters.delete(did));
    state.filters.add(id);
    checkAndUpgrade(id); // 형제 전체 선택 시 자동 승급
  }
}

// ── Event handlers ────────────────────────────────────────────────────────────
function onAllClick() {
  state.filters.clear();
  render();
}

// L1 헤더 클릭 → 펼치기/접기만
function onL1ExpandClick(id) {
  if (state.openL1 === id) {
    state.openL1 = null;
  } else {
    state.openL1 = id;
    state.openL2s.clear();
  }
  render();
}

// L1 내 "전체" 클릭 → L1 필터 토글
function onL1AllClick(id) {
  toggleFilter(id);
  render();
}

// L2 헤더 클릭 → 펼치기/접기만 (선택 없음)
function onL2ExpandClick(id) {
  if (state.openL2s.has(id)) state.openL2s.delete(id);
  else state.openL2s.add(id);
  render();
}

function onL3Click(id) {
  const l2Id = nodes[id].parentId;
  state.openL2s.add(l2Id);
  toggleFilter(id);
  render();
}

function removeFilter(id) {
  state.filters.delete(id);
  render();
}

function doReset() {
  state.openL1 = null;
  state.openL2s.clear();
  state.filters.clear();
  render();
}

// Breadcrumb navigation
function bcGoRoot() {
  state.openL1 = null;
  state.openL2s.clear();
  render();
}

function bcCollapseToL1() {
  state.openL2s.clear();
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  renderList();
  renderBreadcrumb();
  renderTags();
  const count = state.filters.size;
  document.getElementById('tab-cat').textContent = count > 0 ? `카테고리 ${count}` : '카테고리';
}

function renderBreadcrumb() {
  const wrap = document.getElementById('breadcrumb-wrap');
  const content = document.getElementById('breadcrumb-content');

  // Breadcrumb shows current navigation position (what's open)
  if (!state.openL1) {
    wrap.classList.remove('show');
    return;
  }

  wrap.classList.add('show');

  const l1 = nodes[state.openL1];
  const parts = [
    { label: '전체', action: 'root' },
    { label: l1.name, action: 'l1' },
  ];

  // If any L2 under this L1 is open, show the deepest one
  const openL2UnderL1 = [...state.openL2s].find(l2Id => nodes[l2Id].parentId === state.openL1);
  if (openL2UnderL1) {
    parts.push({ label: nodes[openL2UnderL1].name, action: 'none' });
  }

  content.innerHTML = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    const cls = isLast ? 'bc-item current' : 'bc-item';
    const sep = !isLast ? '<span class="bc-sep"> &gt; </span>' : '';
    return `<span class="${cls}" data-action="${p.action}">${p.label}</span>${sep}`;
  }).join('');

  content.querySelectorAll('.bc-item').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.action === 'root') bcGoRoot();
      else if (el.dataset.action === 'l1') bcCollapseToL1();
    });
  });
}

function renderTags() {
  const tagsEl = document.getElementById('filter-tags');
  const btnView = document.getElementById('btn-view');

  if (state.filters.size === 0) {
    tagsEl.innerHTML = '';
    btnView.textContent = '1,444개 상품보기';
    return;
  }

  let total = 0;
  const html = [...state.filters].map(id => {
    const n = nodes[id];
    total += n.count;
    return `<div class="filter-tag">${n.name} <span class="tag-x" data-id="${id}">✕</span></div>`;
  }).join('');

  tagsEl.innerHTML = html;
  btnView.textContent = `${total.toLocaleString()}개 상품보기`;

  tagsEl.querySelectorAll('.tag-x').forEach(el => {
    el.addEventListener('click', () => removeFilter(el.dataset.id));
  });
}

function renderList() {
  const list = document.getElementById('cat-list');
  list.innerHTML = '';

  DATA.forEach(l1 => {
    const isOpen = state.openL1 === l1.id;
    const l1State = getSelectState(l1.id);

    const l1El = document.createElement('div');
    l1El.className = 'l1-item';

    // L1 헤더: 전체 클릭 → 펼치기/접기
    const h1 = document.createElement('div');
    h1.className = 'l1-header';
    h1.innerHTML = `
      <div class="l1-name ${l1State !== 'off' ? l1State : ''}">${l1.name}</div>
      <span class="l1-count">${l1.count}</span>
      <span class="l1-arrow ${isOpen ? 'open' : ''}">▼</span>
    `;
    h1.addEventListener('click', () => onL1ExpandClick(l1.id));
    l1El.appendChild(h1);

    if (isOpen) {
      const l2ListEl = document.createElement('div');
      l2ListEl.className = 'l2-list open';

      // "전체" 행
      const allRow = document.createElement('div');
      allRow.className = 'l1-all-row';
      allRow.innerHTML = `
        <div class="chk-btn ${l1State === 'on' ? 'on' : ''}"></div>
        <div class="l1-all-name ${l1State === 'on' ? 'on' : ''}">전체</div>
      `;
      allRow.addEventListener('click', () => onL1AllClick(l1.id));
      l2ListEl.appendChild(allRow);

      // L2 항목들: 클릭 → 펼치기/접기만
      l1.children.forEach(l2 => {
        const isL2Open = state.openL2s.has(l2.id);
        const l2State = getSelectState(l2.id);

        const l2El = document.createElement('div');
        l2El.className = 'l2-item';

        const h2 = document.createElement('div');
        h2.className = 'l2-header';
        h2.innerHTML = `
          <div class="l2-name ${l2State !== 'off' ? l2State : ''}" style="flex:1;font-size:14px;color:#444;">${l2.name}</div>
          <span class="l2-count">${l2.count}</span>
          <span class="l2-arrow ${isL2Open ? 'open' : ''}">▼</span>
        `;
        h2.addEventListener('click', () => onL2ExpandClick(l2.id));
        l2El.appendChild(h2);

        // L3 리스트 (L2 펼쳤을 때)
        if (isL2Open) {
          const l3ListEl = document.createElement('div');
          l3ListEl.className = 'l3-list open';

          l2.children.forEach(l3 => {
            const isL3Selected = state.filters.has(l3.id);

            const l3El = document.createElement('div');
            l3El.className = 'l3-item';
            l3El.innerHTML = `
              <div class="chk-btn ${isL3Selected ? 'on' : ''}"></div>
              <div class="l3-name ${isL3Selected ? 'on' : ''}">${l3.name}</div>
              <span class="l3-count">${l3.count}</span>
            `;
            l3El.addEventListener('click', () => onL3Click(l3.id));
            l3ListEl.appendChild(l3El);
          });

          l2El.appendChild(l3ListEl);
        }

        l2ListEl.appendChild(l2El);
      });

      l1El.appendChild(l2ListEl);
    }

    list.appendChild(l1El);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', doReset);
render();
</script>
</body>
</html>
